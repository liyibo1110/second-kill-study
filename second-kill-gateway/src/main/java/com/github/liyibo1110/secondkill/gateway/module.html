    <body>
        <p>
            1、秒杀系统所有C端请求的唯一入口，它只负责QPS级别的总流量控制，因为这一层最多只解析协议头，不解析协议体。
            2、内部有三个核心能力：JWT鉴权、Sentinel限流、链路追踪透传，每个能力对应一个过滤器。
            3、根据请求的url路径不同，会经过处理后转发到以下3个后端服务之一：service、admin、support。
            4、这一层只接受HTTP请求，不接受Dubbo请求。
            5、网关基于Spring Cloud Gateway，其内部使用了WebFlux，所以代码里面不能有任何阻塞操作，在网关过滤器代码实现里需要注意。
        </p>
    </body>
</html>
