        <p>
            1、这个模块和base模块作用和结构都类似，区别是它是专门用来执行非秒杀特有的业务，即和原始系统相关的业务。
            2、分成了五个子域：会员（member）、订单同步（order）、支付（payment）、自由卡（account）、风控（risk）。
            3、其中payment特殊一些，没有对应的数据库表，里面是直接调用支付SDK进行支付行为。
            4、支付这块，不同的支付渠道（微信、支付宝等）在真实环境下，其实应该分别部署为不同的微服务，否则会有不同渠道相互影响的隐患。
        </p>
